<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorasync — Painel do Cliente</title>
<style>
  * { box-sizing: border-box; font-family: system-ui, sans-serif; }
  body { background: #0f1115; color: #e6e6e6; margin: 0; padding: 24px; }
  h1 { font-size: 20px; }
  h2 { font-size: 16px; color: #9aa3b2; margin-top: 32px; }
  .card { background: #181b22; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  input, button, textarea, select {
    background: #0f1115; color: #fff; border: 1px solid #2a2e38;
    border-radius: 6px; padding: 8px 10px; margin: 4px 0; width: 100%;
  }
  button { background: #4f7cff; cursor: pointer; border: none; font-weight: 600; width: auto; padding: 8px 16px; }
  button:hover { background: #3f63d6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.danger { background: #c0392b; }
  button.ghost { background: transparent; border: 1px solid #4f7cff; color: #4f7cff; }
  .topbar { display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 8px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-box { background: #1c2029; border-radius: 8px; padding: 16px; text-align: center; }
  .stat-box .num { font-size: 26px; font-weight: 700; }
  .stat-box .label { font-size: 12px; color: #9aa3b2; }
  .stat-box.warn .num { color: #ff9800; }
  .stat-box.danger .num { color: #f44336; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { padding: 8px; border-bottom: 1px solid #2a2e38; text-align: left; font-size: 13px; }
  tr.priority { background: #221a10; }
  .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; white-space: nowrap; }
  .badge-human { background: #ff9800; color: #000; }
  .badge-ai { background: #4caf50; color: #000; }
  .badge-waiting { background: #2196f3; color: #000; }
  .badge-blocked { background: #c0392b; color: #fff; }
  .summary-box { background: #1c2029; border-left: 3px solid #ff9800; padding: 12px; margin-top: 8px; font-size: 13px; }
  .hidden { display: none; }
  .actions button { width: auto; margin-right: 6px; padding: 4px 10px; font-size: 12px; }

  .modal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.modal-box {
  background: #181b22; border-radius: 12px;
  padding: 24px; width: 100%; max-width: 480px;
  max-height: 85vh; overflow-y: auto;
}
.modal-box h3 { margin: 0 0 16px; font-size: 16px; }
.crm-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #2a2e38;
  font-size: 13px; gap: 12px;
}
.crm-row .crm-label { color: #9aa3b2; white-space: nowrap; }
.crm-row .crm-value { text-align: right; word-break: break-word; }
.crm-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
.crm-tag {
  background: #2a2e38; border-radius: 20px;
  padding: 2px 10px; font-size: 12px;
}
.crm-empty { color: #9aa3b2; font-size: 13px; text-align: center; padding: 24px 0; }
.etapa-badge {
  padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
}

  @media (max-width: 640px) {
    body { padding: 12px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    table { display: block; overflow-x: auto; white-space: nowrap; }
    .topbar { flex-direction: column; align-items: stretch; }
    .topbar button { width: 100%; }
  }
</style>
</head>
<body>

<div id="login" class="card">
  <h1>🔐 Painel do Cliente</h1>
  <input id="apiKey" type="password" placeholder="Sua API Key (Dashboard Key)">
  <button onclick="saveKey()">Entrar</button>
</div>

<div id="app" class="hidden">
  <div id="alertBanner" class="hidden" style="background:#ff9800; color:#000; padding:10px 16px; border-radius:8px; margin-bottom:12px; font-weight:600; cursor:pointer;" onclick="document.getElementById('conversationsTable').scrollIntoView({behavior:'smooth'})">
  🔔 <span id="alertCount">0</span> conversa(s) aguardando atendimento humano
  </div>
  <div class="topbar">
    <h1>📊 Dashboard</h1>
    <button class="ghost" onclick="logout()">🚪 Trocar API Key</button>
  </div>

  <div class="card stats" id="statsBox"></div>

  <h2>💬 Conversas</h2>
  <div class="card">
    <button class="ghost" onclick="loadConversations()">🔄 Atualizar</button>
    <table id="conversationsTable">
      <thead>
        <tr><th>Contato</th><th>Estado</th><th>Score</th><th>Resumo do Handoff</th><th>Ações</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <h2>👥 Contatos</h2>
  <div class="card">
    <button class="ghost" onclick="loadContacts()">🔄 Atualizar</button>
    <table id="contactsTable">
      <thead>
        <tr><th>Nome</th><th>Telefone</th><th>Último contato</th><th>Bloqueado</th><th>Ações</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="contactPagination"></div> 
  </div>

  <h2>⚙️ Configurações do Bot</h2>
  <div class="card">
    <label>Nome do bot</label>
    <input id="s_botname">
    <label>Personalidade / Instruções do bot</label>
    <textarea id="s_prompt" rows="6"></textarea>
    <button onclick="saveSettings()">Salvar Configurações</button>
  </div>
</div>

<div id="crmModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3>📋 CRM — <span id="crmContactName"></span></h3>
      <button class="ghost" onclick="closeCrmModal()" style="width:auto; padding:4px 12px;">✕</button>
    </div>
    <div id="crmContent"></div>
  </div>
</div>

<script>
const API = window.location.origin;

function logout() {
  localStorage.removeItem('clientApiKey');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('apiKey').value = '';
}

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return alert('Informe sua API Key');
  localStorage.setItem('clientApiKey', key);
  startApp();
  requestNotificationPermission();
  setInterval(checkHandoffAlerts, 20000);
  checkHandoffAlerts();
}

function getKey() { return localStorage.getItem('clientApiKey'); }

function parseApiError(err, fallback) {
  if (!err) return fallback;
  if (typeof err === 'string') return err;
  if (Array.isArray(err)) return err.map(e => `${(e.loc || []).join('.')}: ${e.msg}`).join(' | ');
  return fallback;
}

async function api(path, method = 'GET', body = null) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-api-key': getKey() },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) {
    let errJson = {};
    try { errJson = await res.json(); } catch (e) {}
    throw new Error(parseApiError(errJson.detail, res.statusText));
  }
  return res.json();
}

async function startApp() {
  try {
    await api('/admin/stats');
  } catch (e) {
    alert('API Key inválida. Faça login novamente.');
    logout();
    return;
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadStats();
  loadConversations();
  loadContacts();
  loadSettings();
}

async function loadStats() {
  try {
    const s = await api('/admin/stats');
    let remainingClass = '';
    if (s.messages_remaining !== null) {
      const pct = s.messages_remaining / (s.max_messages_month || 1);
      if (pct <= 0.1) remainingClass = 'danger';
      else if (pct <= 0.3) remainingClass = 'warn';
    }
    document.getElementById('statsBox').innerHTML = `
      <div class="stat-box"><div class="num">${s.contacts}</div><div class="label">Contatos</div></div>
      <div class="stat-box"><div class="num">${s.conversations}</div><div class="label">Conversas</div></div>
      <div class="stat-box ${remainingClass}">
        <div class="num">${s.messages_remaining ?? '∞'}</div>
        <div class="label">Restantes (${s.messages_month}/${s.max_messages_month})</div>
      </div>
      <div class="stat-box"><div class="num">${s.plan}</div><div class="label">Plano</div></div>
    `;
  } catch (e) { alert('Erro ao carregar stats: ' + e.message); }
}

function stateBadge(state) {
  const map = {
    ai_active: '<span class="badge badge-ai">IA ativa</span>',
    human_active: '<span class="badge badge-human">Humano ativo</span>',
    awaiting_handoff_confirmation: '<span class="badge badge-waiting">Aguardando</span>',
    cooldown: '<span class="badge badge-waiting">Cooldown</span>',
  };
  return map[state] || state;
}

const PRIORITY_STATES = ['human_active', 'awaiting_handoff_confirmation'];

async function loadConversations() {
  try {
    let list = await api('/admin/conversations');
    list = list.sort((a, b) => {
      const aP = PRIORITY_STATES.includes(a.state) ? 0 : 1;
      const bP = PRIORITY_STATES.includes(b.state) ? 0 : 1;
      if (aP !== bP) return aP - bP;
      return new Date(b.created_at) - new Date(a.created_at);
    });

    const tbody = document.querySelector('#conversationsTable tbody');
    tbody.innerHTML = '';
    list.forEach(c => {
      const tr = document.createElement('tr');
      if (PRIORITY_STATES.includes(c.state)) tr.classList.add('priority');
      tr.innerHTML = `
        <td>${c.contact_name || '(sem nome)'}<br><small>${c.phone}</small></td>
        <td>${stateBadge(c.state)}</td>
        <td>${c.handoff_score ?? '-'}</td>
        <td>${c.handoff_summary ? `<div class="summary-box">${c.handoff_summary}</div>` : '-'}</td>
        <td class="actions">
          ${c.state !== 'human_active'
            ? `<button onclick="takeover(${c.id})">Assumir</button>`
            : `<button class="danger" onclick="release(${c.id})">Devolver p/ IA</button>`}
        </td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) { alert('Erro ao carregar conversas: ' + e.message); }
}

async function takeover(id) {
  try { await api(`/admin/conversations/${id}/takeover`, 'POST'); loadConversations(); }
  catch (e) { alert('Erro: ' + e.message); }
}

async function release(id) {
  if (!confirm('Devolver esta conversa para a IA?')) return;
  try { await api(`/admin/conversations/${id}/release`, 'POST'); loadConversations(); }
  catch (e) { alert('Erro: ' + e.message); }
}

async function loadContacts() {
  try {
    const result = await api(`/admin/contacts?page=${contactPage}&limit=${CONTACTS_PER_PAGE}`);
    const tbody = document.querySelector("#contactsTable tbody");
    tbody.innerHTML = "";

    result.data.forEach(c => {
      const tr = document.createElement("tr");
      const hasProfile = c.profile && Object.keys(c.profile).length > 0;
      tr.innerHTML = `
        <td>${c.name || "(sem nome)"}</td>
        <td>${c.phone}</td>
        <td>${c.last_seen ? new Date(c.last_seen).toLocaleString("pt-BR") : "-"}</td>
        <td>${c.ai_blocked ? '<span class="badge badge-blocked">Bloqueado</span>' : "-"}</td>
        <td class="actions">
          <button class="ghost" onclick='openCrmModal(${JSON.stringify(c.name || "")}, ${JSON.stringify(c.profile || {})})' ${hasProfile ? "" : 'style="opacity:0.4"'}>
            📋 CRM
          </button>
          ${c.ai_blocked
            ? `<button onclick="unblockContact(${c.id})">Desbloquear</button>`
            : `<button class="danger" onclick="blockContact(${c.id})">Bloquear IA</button>`}
        </td>
      `;
      tbody.appendChild(tr);
    });

    // paginação
    renderContactPagination(result.total, result.page, result.limit);

  } catch (e) { alert("Erro ao carregar contatos: " + e.message); }
}


const CONTACTS_PER_PAGE = 20;
let contactPage = 1;

function renderContactPagination(total, page, limit) {
  const totalPages = Math.ceil(total / limit);
  const container = document.getElementById("contactPagination");
  if (!container) return;

  if (totalPages <= 1) { container.innerHTML = ""; return; }

  container.innerHTML = `
    <div style="display:flex; gap:8px; align-items:center; margin-top:12px; justify-content:flex-end;">
      <button class="ghost" onclick="goContactPage(${page - 1})" ${page <= 1 ? "disabled" : ""} style="width:auto; padding:4px 12px;">← Anterior</button>
      <span style="font-size:13px; color:#9aa3b2;">${page} / ${totalPages} (${total} contatos)</span>
      <button class="ghost" onclick="goContactPage(${page + 1})" ${page >= totalPages ? "disabled" : ""} style="width:auto; padding:4px 12px;">Próxima →</button>
    </div>
  `;
}

function goContactPage(page) {
  contactPage = page;
  loadContacts();
}



async function blockContact(id) {
  if (!confirm('Bloquear a IA para este número?')) return;
  try { await api(`/admin/contacts/${id}/block`, 'POST'); loadContacts(); }
  catch (e) { alert('Erro: ' + e.message); }
}

async function unblockContact(id) {
  try { await api(`/admin/contacts/${id}/unblock`, 'POST'); loadContacts(); }
  catch (e) { alert('Erro: ' + e.message); }
}

async function loadSettings() {
  try {
    const s = await api('/admin/settings');
    document.getElementById('s_botname').value = s.bot_name || '';
    document.getElementById('s_prompt').value = s.system_prompt || '';
  } catch (e) { alert('Erro ao carregar configurações: ' + e.message); }
}

async function saveSettings() {
  const payload = {
    bot_name: document.getElementById('s_botname').value,
    system_prompt: document.getElementById('s_prompt').value,
  };
  try {
    await api('/admin/settings', 'PATCH', payload);
    alert('Configurações salvas!');
  } catch (e) { alert('Erro: ' + e.message); }
}

// =========================
// NOTIFICAÇÕES PELO PAINEL (substitui WhatsApp)
// =========================
let notifiedConversationIds = new Set();
let audioCtx = null;

function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.15;
    osc.start();
    setTimeout(() => osc.stop(), 200);
  } catch (e) {}
}

function requestNotificationPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function showBrowserNotification(count) {
  if ("Notification" in window && Notification.permission === "granted") {
    new Notification("Vorasync — Atendimento necessário", {
      body: `${count} conversa(s) aguardando atendimento humano`,
      icon: "",
    });
  }
}

async function checkHandoffAlerts() {
  try {
    const list = await api('/admin/conversations');
    const pending = list.filter(c => c.state === 'human_active');

    const banner = document.getElementById('alertBanner');
    const countEl = document.getElementById('alertCount');

    if (pending.length > 0) {
      banner.classList.remove('hidden');
      countEl.textContent = pending.length;
    } else {
      banner.classList.add('hidden');
    }

    // dispara notificação só para conversas novas (evita spam repetido)
    const newOnes = pending.filter(c => !notifiedConversationIds.has(c.id));
    if (newOnes.length > 0) {
      showBrowserNotification(pending.length);
      playBeep();
      newOnes.forEach(c => notifiedConversationIds.add(c.id));
    }

    // remove da memória conversas que já não estão mais pendentes (foram assumidas/liberadas)
    const pendingIds = new Set(pending.map(c => c.id));
    notifiedConversationIds.forEach(id => {
      if (!pendingIds.has(id)) notifiedConversationIds.delete(id);
    });

  } catch (e) {
    // silencioso — não quebra o painel se a checagem falhar
  }
}

// =========================
// CRM
// =========================

const CRM_LABELS = {
  nome:             "Nome",
  empresa:          "Empresa",
  cargo:            "Cargo",
  segmento:         "Segmento",
  cidade:           "Cidade",
  tamanho_empresa:  "Tamanho da empresa",
  decisor:          "Decisor",
  interesse:        "Interesse",
  orcamento:        "Orçamento",
  urgencia:         "Urgência",
  etapa_venda:      "Etapa de venda",
  produto_atual:    "Produto atual",
  processo_atual:   "Processo atual",
  prazo_decisao:    "Prazo de decisão",
  necessidades:     "Necessidades",
  objecoes:         "Objeções",
  resumo_cliente:   "Resumo",
};

const ETAPA_COLORS = {
  descoberta:  "#2196f3",
  interesse:   "#9c27b0",
  orcamento:   "#ff9800",
  negociacao:  "#f44336",
  cliente:     "#4caf50",
};

function renderCrmValue(key, value) {
  if (!value || (Array.isArray(value) && value.length === 0)) return null;

  if (key === "etapa_venda") {
    const color = ETAPA_COLORS[value] || "#4f7cff";
    return `<span class="etapa-badge" style="background:${color}20; color:${color};">${value}</span>`;
  }

  if (Array.isArray(value)) {
    return `<div class="crm-list">${value.map(v => `<span class="crm-tag">${v}</span>`).join("")}</div>`;
  }

  return `<span>${value}</span>`;
}

function openCrmModal(contactName, profile) {
  document.getElementById("crmContactName").textContent = contactName || "(sem nome)";

  const content = document.getElementById("crmContent");

  const entries = Object.entries(CRM_LABELS)
    .map(([key, label]) => ({ key, label, value: profile[key] }))
    .filter(({ value }) => value !== undefined && value !== null && value !== "" && !(Array.isArray(value) && value.length === 0));

  if (entries.length === 0) {
    content.innerHTML = `<div class="crm-empty">Nenhuma informação coletada ainda.<br>As informações aparecem conforme o cliente conversa.</div>`;
  } else {
    content.innerHTML = entries.map(({ key, label, value }) => {
      const rendered = renderCrmValue(key, value);
      return `
        <div class="crm-row">
          <span class="crm-label">${label}</span>
          <span class="crm-value">${rendered}</span>
        </div>
      `;
    }).join("");
  }

  document.getElementById("crmModal").classList.remove("hidden");
}

function closeCrmModal() {
  document.getElementById("crmModal").classList.add("hidden");
}

// fecha ao clicar fora do modal
document.getElementById("crmModal")?.addEventListener("click", function(e) {
  if (e.target === this) closeCrmModal();
});

if (getKey()) {
  startApp();
  requestNotificationPermission();
  setInterval(checkHandoffAlerts, 20000);   // checa a cada 20s
  checkHandoffAlerts();
}
</script>
</body>
</html>
